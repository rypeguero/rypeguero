<svg width="2400" height="800" viewBox="0 0 2400 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ryan Peguero Software Development and Cybersecurity Banner</title>
  <desc id="desc">A dark technology banner highlighting software development, cybersecurity, full-stack apps, secure coding, systems design, SIEM labs, vulnerability management, databases, AI, embedded systems, and technical documentation.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2400" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#050B18"/>
      <stop offset="0.52" stop-color="#071326"/>
      <stop offset="1" stop-color="#020713"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="550" y1="145" x2="1850" y2="275" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.45" stop-color="#D8E8FF"/>
      <stop offset="1" stop-color="#8FBFFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#23B8FF"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#1D8BFF" opacity="0.2"/>
    </pattern>
  </defs>

  <rect width="2400" height="800" fill="url(#bg)"/>
  <rect width="2400" height="800" fill="url(#dots)" opacity="0.45"/>

  <!-- left code panel -->
  <g opacity="0.78" font-family="Consolas, 'Courier New', monospace" font-size="25">
    <text x="25" y="65" fill="#58A6FF">01</text><text x="82" y="65" fill="#C084FC">import</text><text x="185" y="65" fill="#9CDCFE"> React </text><text x="285" y="65" fill="#C084FC">from</text><text x="350" y="65" fill="#40E0FF"> 'react';</text>
    <text x="25" y="105" fill="#58A6FF">02</text><text x="82" y="105" fill="#C084FC">const</text><text x="160" y="105" fill="#9CDCFE"> app = buildPortfolio();</text>
    <text x="25" y="145" fill="#58A6FF">03</text><text x="82" y="145" fill="#C084FC">const</text><text x="160" y="145" fill="#9CDCFE"> repos = [</text>
    <text x="25" y="185" fill="#58A6FF">04</text><text x="130" y="185" fill="#40E0FF">'full-stack'</text><text x="285" y="185" fill="#9CDCFE">,</text><text x="315" y="185" fill="#40E0FF"> 'secure-code'</text><text x="520" y="185" fill="#9CDCFE">,</text>
    <text x="25" y="225" fill="#58A6FF">05</text><text x="130" y="225" fill="#40E0FF">'siem-labs'</text><text x="285" y="225" fill="#9CDCFE">,</text><text x="315" y="225" fill="#40E0FF"> 'systems-design'</text>
    <text x="25" y="265" fill="#58A6FF">06</text><text x="82" y="265" fill="#9CDCFE">];</text>
  </g>

  <!-- decorative circuit paths -->
  <g stroke="url(#accent)" stroke-width="3" fill="none" opacity="0.85" filter="url(#glow)">
    <path d="M0 360 L110 470 H250 L315 420 H505 L555 455 H775"/>
    <path d="M0 450 L110 560 H340 L410 510 H615 L670 545 H805"/>
    <path d="M0 540 L120 650 H395 L460 610 H745"/>
    <circle cx="775" cy="455" r="6" fill="#23B8FF"/>
    <circle cx="805" cy="545" r="6" fill="#8B5CF6"/>
    <circle cx="745" cy="610" r="6" fill="#23B8FF"/>
  </g>

  <!-- right icons -->
  <g stroke="url(#accent)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" filter="url(#glow)">
    <!-- code window -->
    <rect x="1810" y="75" width="230" height="150" rx="18"/>
    <circle cx="1845" cy="105" r="8" fill="#8B5CF6" stroke="none"/>
    <circle cx="1872" cy="105" r="8" fill="#58A6FF" stroke="none"/>
    <circle cx="1899" cy="105" r="8" fill="#8B5CF6" stroke="none"/>
    <path d="M1875 160 L1848 137 L1875 114"/>
    <path d="M1912 114 L1939 137 L1912 160"/>
    <path d="M1970 125 H2020 M1970 155 H2020"/>

    <!-- database -->
    <ellipse cx="2185" cy="95" rx="72" ry="30"/>
    <path d="M2113 95 V205 C2113 222 2145 235 2185 235 C2225 235 2257 222 2257 205 V95"/>
    <path d="M2113 150 C2113 167 2145 180 2185 180 C2225 180 2257 167 2257 150"/>

    <!-- shield -->
    <path d="M1845 305 L1910 270 L1975 305 V390 C1975 445 1910 485 1910 485 C1910 485 1845 445 1845 390 V305Z"/>
    <rect x="1884" y="365" width="52" height="45" rx="7"/>
    <path d="M1896 365 V338 C1896 318 1924 318 1924 338 V365"/>

    <!-- systems diagram -->
    <rect x="2150" y="295" width="62" height="40"/>
    <rect x="2080" y="410" width="62" height="40"/>
    <rect x="2150" y="410" width="62" height="40"/>
    <rect x="2220" y="410" width="62" height="40"/>
    <path d="M2181 335 V380 H2111 V410 M2181 380 V410 M2181 380 H2251 V410"/>

    <!-- AI network -->
    <circle cx="1815" cy="585" r="12"/><circle cx="1865" cy="535" r="12"/><circle cx="1908" cy="610" r="12"/><circle cx="1970" cy="565" r="12"/><circle cx="1930" cy="505" r="12"/>
    <path d="M1815 585 L1865 535 L1908 610 L1970 565 L1930 505 L1815 585 M1865 535 L1970 565 M1930 505 L1908 610"/>

    <!-- chip -->
    <rect x="2070" y="560" width="110" height="110" rx="12"/>
    <rect x="2104" y="594" width="42" height="42" rx="6"/>
    <path d="M2080 535 V560 M2105 535 V560 M2130 535 V560 M2155 535 V560 M2180 535 V560"/>
    <path d="M2080 670 V695 M2105 670 V695 M2130 670 V695 M2155 670 V695 M2180 670 V695"/>
  </g>

  <!-- center text -->
  <g text-anchor="middle" font-family="Arial, Helvetica, sans-serif">
    <text x="1200" y="275" font-size="150" font-weight="800" fill="url(#nameGrad)" letter-spacing="2">Ryan Peguero</text>
    <rect x="750" y="320" width="900" height="3" fill="url(#accent)" opacity="0.8"/>
    <text x="1200" y="390" font-size="43" font-weight="700" fill="#58C7FF" letter-spacing="12">SOFTWARE DEVELOPMENT • CYBERSECURITY</text>
    <text x="1200" y="455" font-size="32" font-weight="700" fill="#F4F8FF" letter-spacing="9">FULL-STACK APPS • SECURE CODING • SYSTEMS DESIGN</text>
    <text x="1200" y="545" font-size="34" fill="#E6EDF7">Projects across full-stack development, SIEM labs, vulnerability management,</text>
    <text x="1200" y="595" font-size="34" fill="#E6EDF7">databases, AI, embedded systems, and technical documentation.</text>
  </g>

  <!-- bottom telemetry bars -->
  <g opacity="0.45" fill="url(#accent)">
    <rect x="760" y="720" width="8" height="30"/><rect x="790" y="690" width="8" height="60"/><rect x="820" y="710" width="8" height="40"/><rect x="850" y="660" width="8" height="90"/>
    <rect x="980" y="700" width="8" height="50"/><rect x="1010" y="675" width="8" height="75"/><rect x="1040" y="715" width="8" height="35"/><rect x="1070" y="640" width="8" height="110"/>
    <rect x="1280" y="705" width="8" height="45"/><rect x="1310" y="665" width="8" height="85"/><rect x="1340" y="690" width="8" height="60"/><rect x="1370" y="625" width="8" height="125"/>
    <rect x="1540" y="720" width="8" height="30"/><rect x="1570" y="685" width="8" height="65"/><rect x="1600" y="700" width="8" height="50"/><rect x="1630" y="655" width="8" height="95"/>
  </g>
</svg>
